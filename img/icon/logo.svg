<svg viewBox="0 0 1000 1000" baseProfile="tiny-ps" xmlns="http://www.w3.org/2000/svg">

<defs>
  <clipPath id="badge">
    <circle cx="500" cy="500" r="420"/>
  </clipPath>
</defs>

<!-- rings -->
<circle cx="500" cy="500" r="480" fill="#24263f"/>
<circle cx="500" cy="500" r="450" fill="#2f3356"/>
<circle cx="500" cy="500" r="420" fill="#3c416a"/>

<g clip-path="url(#badge)">

<!-- T -->
<text x="500" y="590"
  text-anchor="middle"
  dominant-baseline="middle"
  font-size="580"
  font-weight="700"
  fill="#ffffff"
  font-family="Arial, Helvetica, sans-serif">T</text>

<!-- land (top layer) -->
<path d="M0 720 Q220 640 360 680 Q500 720 640 680 Q780 640 1000 720 L1000 1000 L0 1000 Z"
fill="#596598"
stroke="#ffffff"
stroke-width="14"
stroke-linecap="round"
stroke-linejoin="round"/>

<!-- clouds -->
<ellipse cx="270" cy="260" rx="90" ry="30" fill="#ffffff"/>
<ellipse cx="740" cy="250" rx="80" ry="28" fill="#ffffff"/>

</g>

</svg>